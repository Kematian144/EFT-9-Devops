spring.application.name=UsuariosRest
server.port=${SERVER_PORT:8080}

# Conexión a MySQL local. Docker Compose reemplaza DB_HOST por el nombre "mysql".
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:municipalidad_la_florida}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:municipalidad}
spring.datasource.password=${DB_PASSWORD:municipalidad123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
